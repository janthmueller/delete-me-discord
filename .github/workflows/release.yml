name: Release

on:
  workflow_run:
    workflows: ["Test"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  guard:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Check tested SHA matches current main
        id: check
        env:
          TESTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin main
          CURRENT_SHA="$(git rev-parse origin/main)"

          if [ "$TESTED_SHA" = "$CURRENT_SHA" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tested SHA $TESTED_SHA is no longer current main ($CURRENT_SHA); skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: guard
    if: needs.guard.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-semantic-release build twine

      - name: Run semantic-release (version)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"
        run: semantic-release version

      - name: Run semantic-release (publish)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"
        run: semantic-release publish

      - name: Remove old build artifacts
        run: rm -rf dist

      - name: Build package
        run: python -m build

      - name: Validate package
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          password: ${{ secrets.PYPI }}
          skip-existing: true

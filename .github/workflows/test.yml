name: Test

on:
  push:
    branches:
      - main
      - v3
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pytest

      - name: Run tests
        run: python -m pytest -q

  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.6"

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pytest pytest-cov ruff

      - name: Lint
        run: ruff check .

      - name: Enforce test coverage
        run: python -m pytest -q --cov=delete_me_discord --cov-report=term-missing --cov-fail-under=90

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.18.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.11.0

      - name: Install dependencies
        working-directory: docs
        run: pnpm install --frozen-lockfile

      - name: Check docs
        working-directory: docs
        run: pnpm check

      - name: Build docs
        working-directory: docs
        run: pnpm build

  python-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.6"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: Audit Python dependencies
        run: python -m pip_audit .

  docs-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.18.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.11.0

      - name: Install dependencies
        working-directory: docs
        run: pnpm install --frozen-lockfile

      - name: Audit docs dependencies
        working-directory: docs
        run: pnpm audit --audit-level high

  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.6"

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build pyinstaller twine

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        shell: bash
        run: |
          EXPECTED_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          python -m twine check dist/*
          python tools/verify_distribution.py dist/*.whl dist/*.tar.gz "$EXPECTED_VERSION"

      - name: Test installed wheel
        shell: bash
        run: |
          EXPECTED_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          python -m venv wheel-smoke
          wheel-smoke/bin/python -m pip install dist/*.whl
          test "$(wheel-smoke/bin/dmd --version)" = "dmd $EXPECTED_VERSION"

      - name: Build frozen binary
        run: |
          python -m pip install .
          pyinstaller --noconfirm --clean delete_me_discord.spec

      - name: Test frozen binary
        shell: bash
        run: |
          EXPECTED_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$(dist/delete-me-discord/delete-me-discord --version)" = "delete-me-discord $EXPECTED_VERSION"

  nix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Build and test Nix package
        run: nix build --no-link

  build:
    if: always()
    needs:
      - pytest
      - quality
      - docs
      - python-audit
      - docs-audit
      - package
      - nix
    runs-on: ubuntu-latest

    steps:
      - name: Verify all required jobs passed
        shell: bash
        run: |
          test "${{ needs.pytest.result }}" = "success"
          test "${{ needs.quality.result }}" = "success"
          test "${{ needs.docs.result }}" = "success"
          test "${{ needs.python-audit.result }}" = "success"
          test "${{ needs.docs-audit.result }}" = "success"
          test "${{ needs.package.result }}" = "success"
          test "${{ needs.nix.result }}" = "success"
